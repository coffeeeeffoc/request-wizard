<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Request Wizard — Settings</title>
<link rel="stylesheet" href="options.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none"><rect x="2" y="2" width="28" height="28" rx="8" fill="#6C5CE7"/><path d="M10 12h12M10 16h8M10 20h10" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="24" cy="20" r="3" fill="#00cec9"/></svg>
    <h1 class="logo-text">Request Wizard</h1>
    <span class="version">v1.1</span>
  </div>
  <div class="topbar-right">
    <!-- Debug toggle -->
    <label class="debug-toggle" title="Enable debug logging in browser console">
      <input type="checkbox" id="debugToggle">
      <span class="switch-track sm"><span class="switch-thumb"></span></span>
      <span class="debug-label">Debug Log</span>
    </label>
    <div class="topbar-divider"></div>
    <label class="global-switch">
      <input type="checkbox" id="globalToggle">
      <span class="switch-track"><span class="switch-thumb"></span></span>
      <span class="switch-label" id="globalLabel">Enabled</span>
    </label>
    <div class="topbar-divider"></div>
    <!-- Save & Apply button — the big green one -->
    <button class="btn btn-publish" id="btnPublish" title="Save & Apply (Ctrl+S)">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
      Save &amp; Apply
    </button>
    <!-- Dirty indicator -->
    <span class="dirty-dot" id="dirtyDot" title="Unsaved draft changes"></span>
    <div class="topbar-divider"></div>
    <div class="topbar-actions">
      <button class="btn btn-ghost" id="btnImport" title="Import Rules">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        Import
      </button>
      <button class="btn btn-ghost" id="btnExport" title="Export Rules">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
        Export
      </button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Rule Groups</span>
      <button class="btn-icon" id="btnAddGroup" title="Add Group">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
      </button>
    </div>
    <div class="group-list" id="groupList"></div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="10" y="10" width="60" height="60" rx="12"/>
        <path d="M30 30l20 20M50 30L30 50" stroke-linecap="round"/>
      </svg>
      <h2>Select a Rule Group</h2>
      <p>Choose a group from the sidebar or create a new one to get started.</p>
    </div>

    <div class="group-editor" id="groupEditor" style="display:none">
      <div class="group-editor-header">
        <div class="ge-title-row">
          <div class="ge-name-wrapper">
            <input type="text" class="ge-name" id="geGroupName" placeholder="Group Name" spellcheck="false">
            <svg class="edit-hint-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/></svg>
          </div>
          <label class="toggle-label">
            <input type="checkbox" id="geGroupEnabled">
            <span class="switch-track sm"><span class="switch-thumb"></span></span>
          </label>
          <button class="btn btn-danger-ghost" id="btnDeleteGroup" title="Delete Group">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
          </button>
        </div>
        <button class="btn btn-accent" id="btnAddRule">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
          Add Rule
        </button>
      </div>
      <div class="rules-list" id="rulesList"></div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>
<input type="file" id="fileInput" accept=".json" style="display:none">
<script src="options.js"></script>
</body>
</html>
